<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur d'images optimisé</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
            --header-bg: #fff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f4;
            --header-bg: #2d2d2d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden; /* Empêche le scroll inutile en paysage */
        }

        header {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            position: relative;
        }

        /* Bouton Thème - Descendu pour éviter le chevauchement */
        .theme-toggle {
            position: absolute;
            top: 50px; /* Descendu sous le titre */
            right: 20px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            background: var(--header-bg);
            color: var(--text-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 60vh; /* S'adapte à la hauteur de l'écran */
            overflow: hidden;
            border: 2px solid #ccc;
            margin: 20px 0;
        }

        /* Optimisation paysage */
        @media (orientation: landscape) and (max-height: 500px) {
            .container {
                height: 70vh;
                margin: 5px 0;
            }
            header h1 { font-size: 1.2rem; }
            .theme-toggle { top: 10px; right: 10px; } /* Ajusté pour petit paysage */
        }

        .image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .before-image {
            z-index: 1;
        }

        .after-image {
            z-index: 2;
            width: 50%;
            border-right: 3px solid white;
        }

        .slider {
            position: absolute;
            z-index: 3;
            top: 0;
            bottom: 0;
            width: 100%;
            background: transparent;
            cursor: pointer;
            appearance: none;
            margin: 0;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #333;
            border-radius: 50%;
            cursor: ew-resize;
        }

        footer {
            margin-bottom: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Simple comparateur d'image</h1>
    <button class="theme-toggle" onclick="toggleTheme()">Mode Sombre/Clair</button>
</header>

<div class="container" id="comparison-container">
    <div class="image before-image" style="background-image: url('TON_IMAGE_AVANT.jpg');"></div>
    <div class="image after-image" id="after-img" style="background-image: url('TON_IMAGE_APRES.jpg');"></div>
    <input type="range" min="0" max="100" value="50" class="slider" id="image-slider">
</div>

<footer>
    <p>Créé par Harald de Luca</p>
</footer>

<script>
    const slider = document.getElementById('image-slider');
    const afterImg = document.getElementById('after-img');

    slider.addEventListener('input', (e) => {
        const value = e.target.value;
        afterImg.style.width = value + '%';
    });

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }
</script>

</body>
</html>
