<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HDL comparateur d'image</title>
	<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAm0lEQVQ4T2NkwAFm9L34X7x9v/Hl18/XW0X0jO//f/X//v//f8//f/X/f/3//4v9v//4///7v//8///7///9///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f4///7///f///f8///7///f///f8H/f4///7///f///f8AAAABJRU5ErkJggg==">
    <style>
        /* Variables de Thèmes */
        :root { 
            --bg: #121212; --panel-bg: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --input-bg: #252525; --handle-bg: #eee;
        }
        .light-theme { 
            --bg: #f4f7f6; --panel-bg: #ffffff; --text: #2c3e50; --accent: #3498db; --input-bg: #ffffff; --handle-bg: #333;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; transition: background 0.3s, color 0.3s; }
        .main-title { margin-bottom: 20px; font-size: 28px; font-weight: bold; }
        
        /* Bouton Thème */
        #theme-toggle { position: absolute; top: 20px; right: 20px; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--text); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; }

        #admin-panel { background: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 100%; max-width: 800px; display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.2); }
        input { padding: 12px; border: 1px solid rgba(128,128,128,0.3); border-radius: 4px; background: var(--input-bg); color: var(--text); }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        #gen-btn { background: var(--accent); }
        #share-btn { background: #27ae60; }

        /* Viewport : la couleur de fond suit le thème pour camoufler les bords */
        #viewport { 
            position: relative; width: 100%; max-width: 1200px; 
            background: var(--bg); overflow: hidden; border-radius: 4px; 
            display: none; cursor: grab; user-select: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        #zoom-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }

        .img-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; pointer-events: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        #before-mask { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; z-index: 2; border-right: 2px solid white; }
        #handle { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; z-index: 10; cursor: ew-resize; transform: translateX(-50%); }
        #handle-circle { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; color: #121212; width: 36px; height: 36px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); font-weight: bold; font-size: 10px; 
        }

        .label { position: absolute; bottom: 15px; padding: 5px 10px; background: rgba(0,0,0,0.8); color: white; font-size: 11px; border-radius: 3px; z-index: 5; text-transform: uppercase; }
        .l-before { left: 15px; } .l-after { right: 15px; }
        #comp-title-display { margin: 15px 0; font-size: 22px; }
    </style>
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">Mode Clair</button>
    <div class="main-title">HDL comparateur d'image</div>

    <div id="admin-panel">
        <input type="text" id="t-in" placeholder="Titre">
        <input type="text" id="b-in" placeholder="Lien Google Drive - AVANT">
        <input type="text" id="a-in" placeholder="Lien Google Drive - APRÈS">
        <div class="btn-group">
            <button id="gen-btn" onclick="init()">Générer la vue</button>
            <button id="share-btn" onclick="copyURL()">Copier le lien GitHub</button>
        </div>
    </div>

    <h2 id="comp-title-display"></h2>

    <div id="viewport">
        <div id="zoom-container">
            <img id="img-after" class="img-layer">
            <div id="before-mask">
                <img id="img-before" class="img-layer">
            </div>
        </div>
        <div id="handle"><div id="handle-circle">◀▶</div></div>
        <div class="label l-before">Avant</div>
        <div class="label l-after">Après</div>
    </div>

    <script>
        let s = { z: 1, x: 0, y: 0, pos: 50, drag: false, slide: false };
        const view = document.getElementById('viewport');
        const zoomer = document.getElementById('zoom-container');
        const mask = document.getElementById('before-mask');
        const imgB = document.getElementById('img-before');
        const imgA = document.getElementById('img-after');
        const handle = document.getElementById('handle');

        if (window.location.protocol === 'file:') {
            document.getElementById('admin-panel').style.display = 'flex';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const btn = document.getElementById('theme-toggle');
            btn.innerText = document.body.classList.contains('light-theme') ? "Mode Sombre" : "Mode Clair";
        }

        function init() {
            const clean = (u) => {
                const m = u.match(/\/d\/(.+?)(?:\/|$)/);
                return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w16000&nocache=${Date.now()}` : u;
            };
            imgB.src = clean(document.getElementById('b-in').value);
            imgA.src = clean(document.getElementById('a-in').value);
            document.getElementById('comp-title-display').innerText = document.getElementById('t-in').value;
            
            imgA.onload = () => { 
                view.style.display = 'block'; 
                const ratio = imgA.naturalHeight / imgA.naturalWidth;
                view.style.height = (view.offsetWidth * ratio) + "px";
                setTimeout(render, 100); 
            };
        }

        function render() {
            zoomer.style.transform = `translate(${s.x}px, ${s.y}px) scale(${s.z})`;
            mask.style.width = `${s.pos}%`;
            imgB.style.width = zoomer.clientWidth + "px";
            imgB.style.height = zoomer.clientHeight + "px";
            handle.style.left = `${s.pos}%`;
        }

        view.onwheel = (e) => {
            e.preventDefault();
            const r = view.getBoundingClientRect();
            const mX = (e.clientX - r.left - s.x) / s.z;
            const mY = (e.clientY - r.top - s.y) / s.z;
            s.z = Math.min(Math.max(1, s.z - e.deltaY * 0.0015), 20);
            s.x = e.clientX - r.left - mX * s.z;
            s.y = e.clientY - r.top - mY * s.z;
            render();
        };

        view.onmousedown = (e) => { if(e.target.closest('#handle')) s.slide = true; else { s.drag = true; s.sx = e.clientX - s.x; s.sy = e.clientY - s.y; } };
        window.onmousemove = (e) => {
            if(s.slide) { 
                const r = view.getBoundingClientRect(); 
                s.pos = Math.max(0, Math.min(100, ((e.clientX - r.left) / r.width) * 100)); 
            } else if(s.drag) { s.x = e.clientX - s.sx; s.y = e.clientY - s.sy; }
            render();
        };
        window.onmouseup = () => { s.drag = s.slide = false; };

        function copyURL() {
            const u = new URL("https://hdl34.github.io/Image-comparator/");
            u.searchParams.set('title', document.getElementById('t-in').value);
            u.searchParams.set('before', document.getElementById('b-in').value);
            u.searchParams.set('after', document.getElementById('a-in').value);
            navigator.clipboard.writeText(u.href);
            alert("Lien avec thèmes copié !");
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('before')) {
                document.getElementById('t-in').value = p.get('title');
                document.getElementById('b-in').value = p.get('before');
                document.getElementById('a-in').value = p.get('after');
                init();
            }
        };
    </script>
</body>
</html>
