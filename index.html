<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simple comparateur d'image</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1.1">
    <style>
        :root { --bg: #121212; --panel-bg: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --input-bg: #252525; }
        .light-theme { --bg: #f4f7f6; --panel-bg: #ffffff; --text: #2c3e50; --accent: #3498db; --input-bg: #ffffff; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; transition: background 0.3s, color 0.3s; position: relative; overflow-x: hidden; }
        .main-title { margin-bottom: 20px; font-size: 28px; font-weight: bold; }
        
        #theme-toggle { position: absolute; top: 20px; right: 20px; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--text); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; }

        #admin-panel { background: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 100%; max-width: 800px; display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.2); }
        .title-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { padding: 12px; border: 1px solid rgba(128,128,128,0.3); border-radius: 4px; background: var(--input-bg); color: var(--text); }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        #gen-btn { background: var(--accent); }
        #share-btn { background: #27ae60; }

        #viewport { position: relative; background: var(--bg); overflow: hidden; border-radius: 4px; display: none; cursor: grab; user-select: none; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }

        .zoom-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        .img-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        #before-mask { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; z-index: 2; border-right: 2px solid white; box-sizing: border-box; }
        
        #handle { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; z-index: 10; cursor: ew-resize; transform: translateX(-50%); background-color: transparent; display: flex; align-items: center; justify-content: center; }
        #handle-circle { background: white; color: #121212; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,0,0,0.5); font-weight: bold; font-size: 10px; pointer-events: none; }

        .floating-controls { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 20; }
        .float-btn { background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .float-btn:hover { background: rgba(0, 0, 0, 0.9); border-color: white; }

        #zoom-controls { display: flex; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.4); background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .zoom-btn { background: transparent; border: none; color: white; padding: 8px 15px; cursor: pointer; font-size: 16px; transition: 0.2s; min-width: 40px; }
        .zoom-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .zoom-btn:first-child { border-right: 1px solid rgba(255, 255, 255, 0.2); }

        #reset-btn { padding: 8px 16px; display: none; white-space: nowrap; }

        .label { position: absolute; bottom: 15px; padding: 5px 10px; background: rgba(0,0,0,0.8); color: white; font-size: 11px; border-radius: 3px; z-index: 5; text-transform: uppercase; }
        .l-before { left: 15px; } .l-after { right: 15px; }
        #comp-title-display { margin: 15px 0; font-size: 22px; min-height: 30px; }

        footer { position: fixed; bottom: 10px; width: 100%; display: flex; justify-content: center; align-items: center; padding: 0 20px; box-sizing: border-box; font-size: 13px; opacity: 0.7; }
        #lang-selector { position: absolute; left: 20px; padding: 5px; border-radius: 4px; background: var(--panel-bg); color: var(--text); border: 1px solid rgba(128,128,128,0.3); }
        .credits { font-style: italic; }
    </style>
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">Mode Clair</button>
    <div class="main-title" id="main-title-text">Simple comparateur d'image</div>

    <div id="admin-panel">
        <div class="title-grid">
            <input type="text" id="t-fr" placeholder="Titre (Français)">
            <input type="text" id="t-en" placeholder="Title (English)">
            <input type="text" id="t-de" placeholder="Titel (Deutsch)">
            <input type="text" id="t-it" placeholder="Titolo (Italiano)">
            <input type="text" id="t-es" placeholder="Título (Español)">
        </div>
        <hr style="width:100%; opacity:0.1">
        <input type="text" id="b-in" placeholder="Lien Google Drive - AVANT">
        <input type="text" id="a-in" placeholder="Lien Google Drive - APRÈS">
        <div class="btn-group">
            <button id="gen-btn" onclick="init()">Générer la vue</button>
            <button id="share-btn" onclick="copyURL()">Copier le lien GitHub</button>
        </div>
    </div>

    <h2 id="comp-title-display"></h2>

    <div id="viewport">
        <div class="floating-controls">
            <div id="zoom-controls">
                <button class="zoom-btn" onclick="manualZoom(-0.5)">−</button>
                <button class="zoom-btn" onclick="manualZoom(0.5)">+</button>
            </div>
            <button id="reset-btn" class="float-btn" onclick="resetView()">Réinitialiser la vue</button>
        </div>
        <div id="zoom-container-after" class="zoom-container"><img id="img-after" class="img-layer"></div>
        <div id="before-mask"><div id="zoom-container-before" class="zoom-container"><img id="img-before" class="img-layer"></div></div>
        <div id="handle"><div id="handle-circle">◀▶</div></div>
        <div class="label l-before" id="label-before">Avant</div>
        <div class="label l-after" id="label-after">Après</div>
    </div>

    <footer>
        <select id="lang-selector" onchange="changeLang()">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
