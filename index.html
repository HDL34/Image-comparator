<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple comparateur d'image</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1.1">
    <style>
        :root { --bg: #121212; --panel-bg: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --input-bg: #252525; }
        .light-theme { --bg: #f4f7f6; --panel-bg: #ffffff; --text: #2c3e50; --accent: #3498db; --input-bg: #ffffff; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; transition: background 0.3s, color 0.3s; position: relative; overflow-x: hidden; touch-action: none; }
        .main-title { margin-top: 10px; margin-bottom: 15px; font-size: 24px; font-weight: bold; text-align: center; width: 80%; }
        
        #home-btn { position: absolute; top: 15px; left: 15px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--text); background: transparent; color: var(--text); cursor: pointer; z-index: 100; display: none; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; }
        #home-btn:hover { background: rgba(128,128,128,0.2); }

        #theme-toggle { position: absolute; top: 15px; right: 15px; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--text); background: transparent; color: var(--text); cursor: pointer; font-size: 11px; z-index: 100; }
        @media (max-width: 600px) { #theme-toggle { top: 15px; right: 15px; } #home-btn { top: 15px; left: 15px; } .main-title { margin-top: 50px; margin-bottom: 20px; } }

        #admin-panel { background: var(--panel-bg); padding: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 100%; max-width: 800px; display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.2); box-sizing: border-box; }
        .title-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        @media (min-width: 600px) { .title-grid { grid-template-columns: 1fr 1fr; } }
        
        input { padding: 10px; border: 1px solid rgba(128,128,128,0.3); border-radius: 4px; background: var(--input-bg); color: var(--text); font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; min-width: 140px; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        #gen-btn { background: var(--accent); }
        #share-btn { background: #27ae60; }

        #viewport { position: relative; background: var(--bg); overflow: hidden; border-radius: 4px; display: none; cursor: grab; user-select: none; box-shadow: 0 10px 40px rgba(0,0,0,0.4); touch-action: none; width: 95vw; }
        #viewport:fullscreen { width: 100vw !important; height: 100vh !important; border-radius: 0; }

        .zoom-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; will-change: transform; backface-visibility: hidden; }
        .img-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        #before-mask { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; z-index: 2; border-right: 2px solid white; box-sizing: border-box; will-change: width; }
        
        #handle { position: absolute; top: 0; left: 50%; width: 60px; height: 100%; z-index: 10; cursor: ew-resize; transform: translateX(-50%); background-color: transparent; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #handle-circle { background: white; color: #121212; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0,0,0,0.5); font-weight: bold; font-size: 14px; pointer-events: none; }

        /* MODIFICATION : Contrôles calés au bord supérieur du viewport */
        .floating-controls { position: absolute; top: 0; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 20; }
        
        .float-btn { background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid rgba(255, 255, 255, 0.4); border-top: none; border-radius: 0 0 20px 20px; padding: 8px 12px; font-size: 12px; font-weight: bold; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; display: flex; align-items: center; justify-content: center; white-space: nowrap; }

        #zoom-controls { display: flex; border-radius: 0 0 20px 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.4); border-top: none; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .zoom-btn { background: transparent; border: none; color: white; padding: 8px 15px; cursor: pointer; font-size: 18px; min-width: 44px; }
        .zoom-btn:first-child { border-right: 1px solid rgba(255, 255, 255, 0.2); }
        /* FIN MODIFICATION */

        .fullscreen-btn { position: absolute; bottom: 40px; right: 15px; z-index: 20; }
        #reset-btn { display: none; }

        .label { position: absolute; bottom: 10px; padding: 4px 8px; background: rgba(0,0,0,0.8); color: white; font-size: 10px; border-radius: 3px; z-index: 5; text-transform: uppercase; pointer-events: none; }
        .l-before { left: 10px; } .l-after { right: 10px; }
        #comp-title-display { margin: 10px 0; font-size: 18px; min-height: 25px; text-align: center; padding: 0 10px; }

        footer { position: relative; margin-top: 40px; width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center; padding: 20px 0; font-size: 12px; opacity: 0.7; }
        #lang-selector { padding: 5px; border-radius: 4px; background: var(--panel-bg); color: var(--text); border: 1px solid rgba(128,128,128,0.3); }
        @media (min-width: 600px) { footer { position: fixed; bottom: 10px; flex-direction: row; justify-content: center; } #lang-selector { position: absolute; left: 20px; } .credits { position: absolute; right: 20px; } }
    </style>
</head>
<body>

    <a id="home-btn" href="" title="Retour à l'accueil">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>

    <button id="theme-toggle" onclick="toggleTheme()">Mode Clair</button>
    <div class="main-title" id="main-title-text">Simple comparateur d'image</div>

    <div id="admin-panel">
        <div class="title-grid">
            <input type="text" id="t-fr" placeholder="Titre (Français)">
            <input type="text" id="t-en" placeholder="Title (English)">
            <input type="text" id="t-de" placeholder="Titel (Deutsch)">
            <input type="text" id="t-it" placeholder="Titolo (Italiano)">
            <input type="text" id="t-es" placeholder="Título (Español)">
        </div>
        <input type="text" id="b-in" placeholder="Lien Google Drive - AVANT">
        <input type="text" id="a-in" placeholder="Lien Google Drive - APRÈS">
        <div class="btn-group">
            <button id="gen-btn" onclick="init()">Générer la vue</button>
            <button id="share-btn" onclick="copyURL()">Copier le lien GitHub</button>
        </div>
    </div>

    <h2 id="comp-title-display"></h2>

    <div id="viewport">
        <div class="floating-controls">
            <div id="zoom-controls">
                <button class="zoom-btn" onclick="manualZoom(-0.5)">−</button>
                <button class="zoom-btn" onclick="manualZoom(0.5)">+</button>
            </div>
            <button id="reset-btn" class="float-btn" onclick="resetView()">Réinitialiser</button>
        </div>
        
        <button class="float-btn fullscreen-btn" onclick="toggleFullscreen()" id="fs-btn" title="Plein écran">
            <svg id="fs-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>

        <div id="zoom-container-after" class="zoom-container"><img id="img-after" class="img-layer"></div>
        <div id="before-mask"><div id="zoom-container-before" class="zoom-container"><img id="img-before" class="img-layer"></div></div>
        <div id="handle"><div id="handle-circle">◀▶</div></div>
        <div class="label l-before" id="label-before">Avant</div>
        <div class="label l-after" id="label-after">Après</div>
    </div>

    <footer>
        <select id="lang-selector" onchange="changeLang()">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
        </select>
        <div class="credits"><span id="credit-text">Créé par</span> Harald de Luca</div>
    </footer>

    <script>
        const translations = {
            fr: { title: "Simple comparateur d'image", home: "Accueil", before: "Avant", after: "Après", btnTheme: "Mode Clair", btnGen: "Générer la vue", btnShare: "Copier le lien GitHub", createdBy: "Créé par", btnReset: "Réinitialiser", defaultComp: "Comparaison d'image", fullscreen: "Plein écran", exitFullscreen: "Quitter" },
            en: { title: "Simple Image Comparator", home: "Home", before: "Before", after: "After", btnTheme: "Light Mode", btnGen: "Generate View", btnShare: "Copy GitHub Link", createdBy: "Created by", btnReset: "Reset", defaultComp: "Image Comparison", fullscreen: "Fullscreen", exitFullscreen: "Exit" },
            de: { title: "Einfacher Bildvergleich", home: "Startseite", before: "Vorher", after: "Nachher", btnTheme: "Heller Modus", btnGen: "Ansicht generieren", btnShare: "GitHub-Link kopieren", createdBy: "Erstellt von", btnReset: "Zurücksetzen", defaultComp: "Bildvergleich", fullscreen: "Vollbild", exitFullscreen: "Beenden" },
            it: { title: "Semplice Comparatore di Immagini", home: "Home", before: "Prima", after: "Dopo", btnTheme: "Modalità Chiara", btnGen: "Genera Vista", btnShare: "Copia Link GitHub", createdBy: "Creato da", btnReset: "Ripristina", defaultComp: "Confronto images", fullscreen: "Schermo intero", exitFullscreen: "Esci" },
            es: { title: "Comparador de Imágenes Simple", home: "Inicio", before: "Antes", after: "Después", btnTheme: "Modo Claro", btnGen: "Generar Vista", btnShare: "Copiar Enlace GitHub", createdBy: "Creado por", btnReset: "Restablecer", defaultComp: "Comparación de imágenes", fullscreen: "Pantalla completa", exitFullscreen: "Salir" }
        };

        let s = { z: 1, x: 0, y: 0, pos: 50, drag: false, slide: false, lastDist: 0 };
        const view = document.getElementById('viewport');
        const zoomerA = document.getElementById('zoom-container-after');
        const zoomerB = document.getElementById('zoom-container-before');
        const mask = document.getElementById('before-mask');
        const imgB = document.getElementById('img-before');
        const imgA = document.getElementById('img-after');
        const handle = document.getElementById('handle');
        const admin = document.getElementById('admin-panel');

        function changeLang() {
            const l = document.getElementById('lang-selector').value;
            const t = translations[l];
            document.getElementById('main-title-text').innerText = t.title;
            document.getElementById('label-before').innerText = t.before;
            document.getElementById('label-after').innerText = t.after;
            document.getElementById('credit-text').innerText = t.createdBy;
            document.getElementById('reset-btn').innerText = t.btnReset;
            document.getElementById('home-btn').title = t.home;
            document.getElementById('fs-btn').title = document.fullscreenElement ? t.exitFullscreen : t.fullscreen;
            const customTitle = document.getElementById('t-' + l).value;
            document.getElementById('comp-title-display').innerText = customTitle || t.defaultComp;
        }

        function toggleTheme() { document.body.classList.toggle('light-theme'); changeLang(); }

        function toggleFullscreen() {
            if (!document.fullscreenElement) { view.requestFullscreen().catch(err => console.log(err)); } 
            else { document.exitFullscreen(); }
        }

        document.addEventListener('fullscreenchange', () => {
            updateViewportSize();
            changeLang();
            const fsIcon = document.getElementById('fs-icon');
            if (document.fullscreenElement) {
                fsIcon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>';
            } else {
                fsIcon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>';
            }
        });

        function init() {
            const clean = (u) => {
                const m = u.match(/\/d\/(.+?)(?:\/|$)/);
                return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w16000&nocache=${Date.now()}` : u;
            };
            imgB.src = clean(document.getElementById('b-in').value);
            imgA.src = clean(document.getElementById('a-in').value);
            imgA.onload = () => { view.style.display = 'block'; updateViewportSize(); changeLang(); };
        }

        function updateViewportSize() {
            if (!imgA.naturalWidth) return;
            const isFS = !!document.fullscreenElement;
            const ratio = imgA.naturalWidth / imgA.naturalHeight;
            if (isFS) {
                view.style.width = "100vw"; view.style.height = "100vh";
            } else {
                const maxWidth = Math.min(window.innerWidth - 20, 1200); 
                const offsetHeight = window.innerHeight < 500 ? 120 : 250;
                const maxHeight = window.innerHeight - offsetHeight; 
                let finalWidth = maxWidth, finalHeight = finalWidth / ratio;
                if (finalHeight > maxHeight) { finalHeight = maxHeight; finalWidth = finalHeight * ratio; }
                view.style.width = finalWidth + "px"; view.style.height = finalHeight + "px";
            }
            render();
        }

        function render() {
            const transformStr = `translate(${s.x}px, ${s.y}px) scale(${s.z})`;
            zoomerA.style.transform = transformStr; zoomerB.style.transform = transformStr;
            zoomerB.style.width = view.offsetWidth + "px"; zoomerB.style.height = view.offsetHeight + "px";
            mask.style.width = `${s.pos}%`; handle.style.left = `${s.pos}%`;
            document.getElementById('reset-btn').style.display = (s.z !== 1 || s.x !== 0 || s.y !== 0) ? 'block' : 'none';
        }

        function resetView() { s.z = 1; s.x = 0; s.y = 0; render(); }

        function manualZoom(delta) {
            const oldZ = s.z; s.z = Math.min(Math.max(1, s.z + delta), 20);
            const r = view.getBoundingClientRect();
            const cX = r.width / 2; const cY = r.height / 2;
            s.x = cX - ((cX - s.x) / oldZ) * s.z; s.y = cY - ((cY - s.y) / oldZ) * s.z;
            render();
        }

        view.onwheel = (e) => {
            e.preventDefault(); 
            const r = view.getBoundingClientRect();
            const mX = (e.clientX - r.left - s.x) / s.z;
            const mY = (e.clientY - r.top - s.y) / s.z;
            s.z = Math.min(Math.max(1, s.z - e.deltaY * 0.0015), 20);
            s.x = e.clientX - r.left - mX * s.z; s.y = e.clientY - r.top - mY * s.z;
            render();
        };

        view.onmousedown = (e) => { 
            if(e.target.closest('.floating-controls') || e.target.closest('.fullscreen-btn')) return;
            if(e.target.closest('#handle')) s.slide = true; 
            else { s.drag = true; s.sx = e.clientX - s.x; s.sy = e.clientY - s.y; view.style.cursor = 'grabbing'; } 
        };

        view.ontouchstart = (e) => {
            if(e.target.closest('.floating-controls') || e.target.closest('.fullscreen-btn')) return;
            e.preventDefault();
            if(e.touches.length === 1) {
                const t = e.touches[0];
                if(e.target.closest('#handle')) s.slide = true;
                else { s.drag = true; s.sx = t.clientX - s.x; s.sy = t.clientY - s.y; }
            } else if (e.touches.length === 2) {
                s.drag = false; s.slide = false;
                s.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        };

        window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
        window.ontouchmove = (e) => {
            if (s.drag || s.slide || e.touches.length > 1) e.preventDefault();
            if(e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
            else if(e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const delta = (dist - s.lastDist) * (s.z * 0.01);
                const oldZ = s.z; s.z = Math.min(Math.max(1, s.z + delta), 20);
                const r = view.getBoundingClientRect();
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
                s.x = midX - ((midX - s.x) / oldZ) * s.z; s.y = midY - ((midY - s.y) / oldZ) * s.z;
                s.lastDist = dist; render();
            }
        };

        function handleMove(clientX, clientY) {
            if(s.slide) { 
                const r = view.getBoundingClientRect(); 
                s.pos = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100)); 
                render(); 
            } else if(s.drag) { 
                s.x = clientX - s.sx; s.y = clientY - s.sy; render(); 
            }
        }

        window.onmouseup = window.ontouchend = () => { s.drag = s.slide = false; view.style.cursor = 'grab'; };

        function copyURL() {
            let baseURL = window.location.href.split('?')[0];
            if (window.location.protocol === 'file:') baseURL = "https://hdl34.github.io/Image-comparator/";
            const u = new URL(baseURL);
            ['fr', 'en', 'de', 'it', 'es'].forEach(l => {
                const val = document.getElementById('t-'+l).value;
                if(val) u.searchParams.set('t-'+l, val);
            });
            u.searchParams.set('before', document.getElementById('b-in').value);
            u.searchParams.set('after', document.getElementById('a-in').value);
            navigator.clipboard.writeText(u.href); alert("Lien copié !");
        }

        const homeBtn = document.getElementById('home-btn');
        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            homeBtn.href = window.location.pathname;

            if(window.location.protocol === 'file:' || !p.has('before')) {
                admin.style.display = 'flex';
                homeBtn.style.display = 'none';
            }
            if(p.has('before')) {
                ['fr', 'en', 'de', 'it', 'es'].forEach(l => {
                    const val = p.get('t-'+l);
                    if(val) document.getElementById('t-'+l).value = val;
                });
                document.getElementById('b-in').value = p.get('before');
                document.getElementById('a-in').value = p.get('after');
                homeBtn.style.display = 'flex';
                init();
            }
        };
        window.addEventListener('resize', updateViewportSize);
    </script>
</body>
</html>
