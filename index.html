<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple comparateur d'image</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1.1">
    <style>
        :root { 
			--bg: #121212; 
			--panel-bg: #1e1e1e; 
			--text: #e0e0e0; 
			--accent: #3498db; 
			--input-bg: #252525; 
		}
		
        .light-theme { 
			--bg: #f4f7f6; 
			--panel-bg: #ffffff; 
			--text: #2c3e50; 
			--accent: #3498db; 
			--input-bg: #ffffff; 
		}
        
		/* Reset parfait du navigateur */
		html, body {
			margin: 0 !important;
			padding: 0 !important;
			width: 100%;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			overflow-x: hidden; /* Empêche tout glissement horizontal */
		}		
		
        body { 
			font-family: 'Segoe UI', sans-serif; 
			background: var(--bg); 
			color: var(--text); 
			display: flex; 
			flex-direction: column; /* Aligne les éléments verticalement */
			align-items: center; 
			padding: 10px; margin: 0; 
			min-height: 100vh;  /* S'assure que le corps fait au moins la taille de l'écran */
			transition: background 0.3s, color 0.3s; 
			position: relative; 
			overflow-x: hidden; 
		}

		/* Contenu principal centré normalement */
		.main-content {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			width: 100%;
			padding-top: 20px;
			padding-bottom: 40px; 
			box-sizing: border-box;
		}
		
        .main-title { 
			margin-top: 10px; 
			margin-bottom: 15px; 
			font-size: 24px; 
			font-weight: bold; 
			text-align: center; 
			width: 80%; 
		}
        
        #home-btn { 
			position: absolute; 
			top: 15px; 
			left: 15px; 
			width: 40px; 
			height: 40px; 
			border-radius: 10%; 
			border: 1px solid rgba(128,128,128,0.3); 
			background: var(--panel-bg); 
			color: var(--text); 
			cursor: pointer; 
			z-index: 100; 
			display: none; 
			align-items: center; 
			justify-content: center; 
			transition: 0.2s; 
			text-decoration: none; 
		}
		
        #home-btn:hover { background: rgba(128,128,128,0.2); 
		}

        #theme-toggle { 
			position: absolute; 
			top: 15px; 
			right: 15px; 
			padding: 8px 12px; 
			border-radius: 4px; 
			border: 1px solid rgba(128,128,128,0.3); 
			background: var(--panel-bg); 
			color: var(--text); 
			cursor: pointer; 
			font-size: 11px; 
			z-index: 100; 
		}
		
        @media (max-width: 600px) { 
			#theme-toggle { top: 15px; 
				right: 15px; 
			} 
			#home-btn { top: 15px; 
				left: 15px; 
			} 
			
			.main-title { margin-top: 50px; 
				margin-bottom: 20px; 
			} 
		}

        #admin-panel { 
			background: var(--panel-bg); 
			padding: 15px; 
			border-radius: 8px; 
			box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
			width: 100%; max-width: 1100px; 
			display: none; 
			flex-direction: column; 
			gap: 10px; margin-bottom: 20px; 
			border: 1px solid rgba(128,128,128,0.2); 
			box-sizing: border-box; 
		}
		
        .title-grid { 
			display: grid; 
			grid-template-columns: 1fr; 
			gap: 8px; 
		}
        @media (min-width: 600px) { 
			.title-grid { grid-template-columns: repeat(5, 1fr); 
			} 
		}
		
        .link-grid { 
			display: grid; 
			grid-template-columns: 1fr; 
			gap: 10px; 
		}		

        @media (min-width: 600px) { 
			.link-grid { 
				grid-template-columns: 1fr 1fr; 
			} 
		}
		
		.input-group {
			display: flex;
			background: var(--input-bg);
			border: 1px solid #444;
			border-radius: 6px;
			overflow: hidden;
		}

		.source-sel {
			background: #333;
			color: white;
			border: none;
			border-right: 1px solid #444;
			padding: 0 5px;
			font-size: 11px;
			cursor: pointer;
			outline: none;
		}

		.input-group input {
			border: none !important; /* On enlève la bordure de l'input car le groupe en a une */
			flex-grow: 1;
		}

		.up-btn {
			flex-grow: 1;
			background: var(--accent);
			color: white;
			border: none;
			cursor: pointer;
			font-weight: bold;
			font-size: 13px;
		}

		.up-btn:hover { background: #2980b9; }

		.source-sel-main {
			background: var(--panel-bg);
			color: var(--text);
			border: 1px solid #444;
			border-radius: 6px;
			padding: 8px 15px;
			cursor: pointer;
			outline: none;
			font-weight: bold;
		}

		.input-container {
			width: 100%;
			display: flex;
		}

		/* Force le bouton à prendre TOUTE la largeur du champ texte */
		.up-btn {
			width: 100%;
			height: 42px; /* Ajuste selon la hauteur de tes inputs */
			background: var(--accent);
			color: white;
			border: 1px solid #444;
			border-radius: 6px;
			cursor: pointer;
			font-weight: bold;
		}
		
        input { 
			padding: 10px; 
			border: 1px solid rgba(128,128,128,0.3); 
			border-radius: 4px; 
			background: var(--input-bg); 
			color: var(--text); 
			font-size: 14px; 
			width: 100%; 
			box-sizing: border-box; 
		}
		
		.btn-group { 
            display: flex; 
            gap: 10px; 
            width: 100%; 
        }
        
        .btn-group button { 
            flex: 1; /* Force les boutons à prendre 50% de la largeur chacun */
            padding: 12px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            transition: 0.2s; 
        }
        
        .btn-group { 
			display: flex; 
			gap: 10px; 
			flex-wrap: wrap; 
		}
		
        #gen-btn { background: var(--accent); }
        #share-btn { background: #27ae60; }
		
		/* Animation d'éclaircissement */
		@keyframes flash-white {
			0% { filter: brightness(1); }
			50% { filter: brightness(1.8); }
			100% { filter: brightness(1); }
		}

		.flash-effect {
			animation: flash-white 0.3s ease-out;
		}		
		
        .host-btn-group { 
			display: flex; 
			gap: 10px; 
			flex-wrap: wrap; 
			justify-content: center; 
			margin: 10px 0 15px 0; 
		}
		
        .host-img-btn { 
			display: inline-block; 
			transition: transform 0.2s, opacity 0.2s; 
			text-decoration: none; 
		}
		
        .host-img-btn:hover { 
			transform: scale(1.05); 
		}
			.host-img-btn img { 
			height: 40px; width: auto; 
			border: none; 
			display: block; 
		}

        #viewport { 
			position: relative; 
			background: var(--bg); 
			overflow: hidden; 
			border-radius: 4px; 
			display: none; 
			cursor: grab; 
			user-select: none; 
			box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
			touch-action: none; 
			width: 95vw; 
		}
		
		/* --- SPINNER DE CHARGEMENT --- */
		#loading-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: var(--bg); /* S'adapte au mode clair/sombre */
			z-index: 1000; /* Augmenté pour la sécurité */
			display: none;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}

		.spinner {
			width: 50px;
			height: 50px;
			border: 5px solid rgba(128, 128, 128, 0.2);
			border-top-color: var(--accent); /* La bordure qui tourne est bleue */
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		#loading-text {
			margin-top: 15px;
			font-weight: bold;
			color: var(--text); /* S'adapte au mode clair/sombre */
		}
		
        #viewport:fullscreen { 
			width: 100vw !important; 
			height: 100vh !important; 
			border-radius: 0; 
		}

        .zoom-container { 
			position: absolute; 
			top: 0; left: 0; 
			width: 100%; 
			height: 100%; 
			transform-origin: 0 0; 
			will-change: transform; 
			backface-visibility: hidden; 
		}
		
        .img-layer { 
			position: absolute; 
			top: 0; 
			left: 0; 
			width: 100%; 
			height: 100%; 
			object-fit: contain; 
			pointer-events: none; 
			image-rendering: pixelated; 
			image-rendering: crisp-edges; 
		}
        
        #before-mask { 
			position: absolute; 
			top: 0; left: 0; 
			width: 50%; 
			height: 100%; 
			overflow: hidden; 
			z-index: 2; 
			border-right: 2px solid white; 
			box-sizing: border-box; 
			will-change: width; 
		}
		
        #handle { 
			position: absolute; 
			top: 0; left: 50%; 
			width: 60px; 
			height: 100%; 
			z-index: 10; 
			cursor: ew-resize; 
			transform: translateX(-50%); 
			background-color: transparent; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			will-change: left; 
		}
		
        #handle-circle { 
			background: white; 
			color: #121212; 
			width: 40px; 
			height: 40px; 
			border-radius: 50%; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			box-shadow: 0 0 15px rgba(0,0,0,0.5); 
			font-weight: bold; 
			font-size: 14px; 
			pointer-events: none; 
		}

        /* Transition fluide de retour au centre uniquement */
        .resetting #before-mask, .resetting #handle { transition: width 0.5s ease-out, left 0.5s ease-out; }

        .floating-controls { 
			position: absolute; 
			top: 1px; left: 50%; 
			transform: translateX(-50%); 
			display: none; 
			gap: 10px; 
			z-index: 20; 
		}
		
        .float-btn { 
			background: rgba(0, 0, 0, 0.7); 
			color: #fff; 
			border: 1px solid rgba(255, 255, 255, 0.4); 
			border-radius: 4px; 
			padding: 8px 12px; 
			font-size: 12px; 
			font-weight: bold; 
			cursor: pointer; 
			backdrop-filter: blur(4px); 
			transition: 0.2s; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			white-space: nowrap; 
		}

        .fullscreen-btn { 
			position: absolute; 
			bottom: 40px; 
			right: 12px; z-index: 20; 
			width: 44px; 
			height: 44px; 
			min-width: 44px; 
			padding: 0; 
			border-radius: 10%; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
		}

        #zoom-controls { 
			display: flex; 
			border-radius: 4px; 
			overflow: hidden; 
			border: 1px solid rgba(255, 255, 255, 0.4); 
			background: rgba(0, 0, 0, 0.7); 
			backdrop-filter: blur(4px); 
		}
		
        .zoom-btn { 
			background: transparent; 
			border: none; 
			color: white; 
			padding: 8px 15px; 
			cursor: pointer; 
			font-size: 18px; 
			min-width: 44px; 
		}
		
        .zoom-btn:first-child { 
			border-right: 1px solid rgba(255, 255, 255, 0.2); 
		}

        .label { 
			position: absolute; 
			bottom: 10px; 
			padding: 4px 8px; 
			background: rgba(0,0,0,0.8); 
			color: white; 
			font-size: 10px; 
			border-radius: 3px; 
			z-index: 5; 
			text-transform: uppercase; 
			pointer-events: none; 
		}
		
        .l-before { left: 10px; } .l-after { right: 10px; }
        #comp-title-display { 
			margin: 10px 0; 
			font-size: 18px; 
			min-height: 25px; 
			text-align: center; 
			padding: 0 10px; 
			display: none; 
		}

		footer { 
			position: relative; 
			width: 100%; 
			display: flex; 
			justify-content: center; 
			align-items: center; 
			padding: 20px 0; 
			margin-top: auto; /* Pousse vers le bas si le contenu est court */
			font-size: 12px; 
			opacity: 0.7; 
			min-height: 50px;
		}

		/* Footer configuré en 3 zones pour un centrage parfait */
		.site-footer {
			background-color: #1a252f;
			width: 100%;
			margin: 0;
			padding: 10px 20px;
			min-height: 50px; /* Donne une hauteur stable pour faciliter le centrage */
			box-sizing: border-box;
			border-top: 1px solid rgba(255, 255, 255, 0.1);
			display: grid;
			grid-template-columns: 1fr auto 1fr; /* Aligne le centre sur le vrai milieu de l'écran */
			align-items: center;
		}
		
		/* 4. Le conteneur interne du footer */
		.footer-content {
			display: flex;
			align-items: center;
			justify-content: space-between; /* Espace les éléments (langue à gauche, stats à droite) */
			max-width: 1400px; /* Optionnel: empêche les éléments d'être collés aux bords extrêmes sur un écran géant */
			margin: 0 auto;
			padding: 0 20px;
			width: 100%;
			box-sizing: border-box;
		}

		.footer-link {
			color: #ecf0f1;
			text-decoration: none;
			display: flex;
			align-items: center;
			gap: 8px;
			transition: opacity 0.2s ease, color 0.2s ease;
		}

		.footer-link:hover {
			opacity: 0.7; /* Petit effet de survol */
		}

		.footer-separator {
			opacity: 0.3;
			user-select: none;
		}

		@media (min-width: 600px) {
			#lang-selector { 
				position: absolute; 
				left: 10px; 
			}
		}

		/* En mode portrait ou petit écran, on empile proprement */
		@media (max-width: 599px) {
			footer {
				flex-direction: column;
				gap: 15px;
			}
		}
			
		#lang-selector {
			margin: 0; /* Supprime toute marge qui pourrait le pousser vers le bas */
			padding: 4px 8px;
			background-color: #2c3e50;
			color: white;
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 4px;
			cursor: pointer;
			font-size: 0.9em;
			outline: none;
		}

		/* Zone gauche (Sélecteur) */
		.footer-left {
			display: flex;
			align-items: center; /* Force le centrage vertical du bouton de langue */
			justify-content: flex-start;
			height: 100%; /* S'assure qu'il utilise toute la hauteur du footer pour se centrer */
		}

		/* Zone centrale (GitHub | Nom | Compteur) - Bien regroupés */
		.footer-center {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 15px; /* L'espace entre tes éléments centraux */
			color: #ecf0f1;
		}
		
    </style>
<script async src="https://freeimage.host/sdk/pup.js"></script>
</head>

<body>

    <div class="main-content">
		<a id="home-btn" href="" title="Retour à l'accueil">
			<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
				<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
				<polyline points="9 22 9 12 15 12 15 22"></polyline>
			</svg>
		</a>

		<button id="theme-toggle" onclick="toggleTheme()"></button>
		<div class="main-title" id="main-title-text"></div>

		<div id="admin-panel">
			<div class="title-grid">
				<input type="text" id="t-fr" placeholder="Titre (Français)">
				<input type="text" id="t-en" placeholder="Title (English)">
				<input type="text" id="t-de" placeholder="Titel (Deutsch)">
				<input type="text" id="t-it" placeholder="Titolo (Italiano)">
				<input type="text" id="t-es" placeholder="Título (Español)">
			</div>
			
			<p id="host-help-text" style="font-size: 14px; margin: 5px 0; text-align: center;"></p>
			
			<div class="host-btn-group">
				<a href="https://zupimages.net/" target="_blank" class="host-img-btn"><img src="zupimages.net.png" alt="Zupimages"></a>
				<a href="https://freeimage.host/upload" target="_blank" class="host-img-btn"><img src="freeimage.host.png" alt="Freeimage"></a>
				<a href="https://goopics.net/" target="_blank" class="host-img-btn"><img src="goopics.net.png" alt="Goopics"></a>
				<a href="https://imgur.com/upload" target="_blank" class="host-img-btn"><img src="Imgur_Logo.png" alt="Imgur"></a>
				<a href="https://postimages.org/" target="_blank" class="host-img-btn"><img src="postimages.org.png" alt="PostImage"></a>
				<a href="https://imgbb.com/upload" target="_blank" class="host-img-btn"><img src="imgbb-logo.png" alt="ImgBB"></a>
			</div>

			<div style="margin-bottom: 10px; width: 100%; display: flex; justify-content: center;">
				<select id="global-source-sel" class="source-sel-main" onchange="toggleGlobalMode(this.value)">
					<option value="url">🌐 Mode : Coller des liens URL</option>
					<option value="upload">☁️ Mode : Uploader via Freeimage</option>
				</select>
			</div>

			<div class="link-grid">
				<div class="input-container">
					<input type="text" id="b-in" placeholder="Lien de l'image - AVANT">
					<button id="up-btn-b" class="up-btn" onclick="triggerUpload('b-in')" style="display:none">📁 Parcourir (AVANT)</button>
				</div>

				<div class="input-container">
					<input type="text" id="a-in" placeholder="Lien de l'image - APRÈS">
					<button id="up-btn-a" class="up-btn" onclick="triggerUpload('a-in')" style="display:none">📁 Parcourir (APRÈS)</button>
				</div>
			</div>
			
			<p id="direct-link-note" style="font-size: 12px; margin-top: -5px; margin-bottom: 10px; opacity: 0.8; font-style: italic;"></p>
			
			<div class="btn-group">
				<button id="gen-btn" onclick="init()"></button>
				<button id="share-btn" onclick="copyURL()"></button>
			</div>
		</div>

		<h2 id="comp-title-display"></h2>

		<div id="viewport">
			<div id="loading-overlay" style="display: none;">
				<div class="spinner"></div>
				<div id="loading-text"></div>
			</div>
			<div class="floating-controls">
				<div id="zoom-controls">
					<button id="zoom-out-btn" class="zoom-btn" onclick="manualZoom(-0.5)" title=""></button>
					<button id="zoom-in-btn" class="zoom-btn" onclick="manualZoom(0.5)" title=""></button>
				</div>
				<button id="reset-btn" class="float-btn" style="display:none;" onclick="resetView()" title=""></button>
			</div>
			
			<button class="float-btn fullscreen-btn" onclick="toggleFullscreen()" id="fs-btn">
				<svg id="fs-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
					<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
				</svg>
			</button>

			<div id="zoom-container-after" class="zoom-container"><img id="img-after" class="img-layer"></div>
			<div id="before-mask"><div id="zoom-container-before" class="zoom-container"><img id="img-before" class="img-layer"></div></div>
			<div id="handle"><div id="handle-circle">◀▶</div></div>
			<div class="label l-before" id="label-before">Avant</div>
			<div class="label l-after" id="label-after">Après</div>
		</div>
    </div> 
	
    <footer class="site-footer">

		<div class="footer-left">	
			<select id="lang-selector" onchange="changeLang()">
				<option value="fr">Français</option>
				<option value="en">English</option>
				<option value="de">Deutsch</option>
				<option value="it">Italiano</option>
				<option value="es">Español</option>
			</select>
		</div>
		
		<div class="footer-center">

        const clean = (u) => {
            if (!u) return "";
            u = u.trim();
            const driveMatch = u.match(/\/d\/(.+?)(?:\/|$)/);
            if (driveMatch) return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w16000&nocache=${Date.now()}`;
            if (u.includes("imgur.com") && !u.match(/\.(jpg|png|gif|webp)$/)) {
                const imgurId = u.split('/').pop();
                return `https://i.imgur.com/${imgurId}.png`;
            }
            return u;
        };

		function applyFlash(elementId) {
			const el = document.getElementById(elementId);
			el.classList.remove('flash-effect'); // On retire si déjà présent
			void el.offsetWidth; // "Magic" pour forcer le redémarrage de l'animation
			el.classList.add('flash-effect');
			
			// On retire la classe après l'animation (0.3s) pour pouvoir recommencer
			setTimeout(() => el.classList.remove('flash-effect'), 300);
		}

		function init() {
			const beforeVal = document.getElementById('b-in').value.trim();
			const afterVal = document.getElementById('a-in').value.trim();

			// --- 2. PRÉPARATION DE L'INTERFACE ---
			applyFlash('gen-btn');

			document.getElementById('comp-title-display').style.display = 'block';
			document.getElementById('loading-overlay').style.display = 'flex'; 
			document.querySelector('.floating-controls').style.display = 'none'; 

			// L'astuce magique pour forcer le dessin du spinner
			void view.offsetWidth;

			// --- 3. MICRO-PAUSE DE 50ms AVANT DE CHARGER ---
			setTimeout(() => {
				imgB.src = clean(beforeVal);
				imgA.src = clean(afterVal);

				imgA.onload = () => { 
					// --- 4. DÉLAI DE 300ms POUR UNE ANIMATION FLUIDE ---
					setTimeout(() => {
						document.getElementById('loading-overlay').style.display = 'none'; 
						document.querySelector('.floating-controls').style.display = 'flex'; 
						updateViewportSize(); 
						changeLang(); 
					}, 300); // Fin du délai de 300ms

				imgA.onerror = () => {
					const currentLang = document.getElementById('lang-selector').value;
					document.getElementById('loading-text').innerText = translations[currentLang].error;
					document.querySelector('.spinner').style.display = 'none';
				};
			}, 50); // Fin du SetTimeout de 50ms
		}

        function updateViewportSize() {
            if (!imgA.naturalWidth) return;
            const ratio = imgA.naturalWidth / imgA.naturalHeight;
            if (document.fullscreenElement) {
                view.style.width = "100vw"; view.style.height = "100vh";
            } else {
                const maxWidth = Math.min(window.innerWidth - 20, 1200); 
                const maxHeight = window.innerHeight - (window.innerHeight < 500 ? 120 : 250);
                let finalWidth = maxWidth, finalHeight = finalWidth / ratio;
                if (finalHeight > maxHeight) { finalHeight = maxHeight; finalWidth = finalHeight * ratio; }
                view.style.width = finalWidth + "px"; view.style.height = finalHeight + "px";
            }
            render();
        }

        function render() {
            const transformStr = `translate(${s.x}px, ${s.y}px) scale(${s.z})`;
            zoomerA.style.transform = transformStr; zoomerB.style.transform = transformStr;
            zoomerB.style.width = view.offsetWidth + "px"; zoomerB.style.height = view.offsetHeight + "px";
            mask.style.width = `${s.pos}%`; handle.style.left = `${s.pos}%`;
            document.getElementById('reset-btn').style.display = (s.z !== 1 || s.x !== 0 || s.y !== 0) ? 'block' : 'none';
        }

        function resetView() { s.z = 1; s.x = 0; s.y = 0; render(); }

        function manualZoom(delta) {
            const oldZ = s.z; s.z = Math.min(Math.max(1, s.z + delta), 20);
            const r = view.getBoundingClientRect();
            const cX = r.width / 2, cY = r.height / 2;
            s.x = cX - ((cX - s.x) / oldZ) * s.z; s.y = cY - ((cY - s.y) / oldZ) * s.z;
            render();
        }

        view.onwheel = (e) => {
            e.preventDefault(); 
            const r = view.getBoundingClientRect();
            const mX = (e.clientX - r.left - s.x) / s.z, mY = (e.clientY - r.top - s.y) / s.z;
            s.z = Math.min(Math.max(1, s.z - e.deltaY * 0.0015), 20);
            s.x = e.clientX - r.left - mX * s.z; s.y = e.clientY - r.top - mY * s.z;
            render();
        };

        view.onmousedown = (e) => { 
            if(e.target.closest('.floating-controls') || e.target.closest('.fullscreen-btn')) return;
            view.classList.remove('resetting');
            if(e.target.closest('#handle')) s.slide = true; 
            else { s.drag = true; s.sx = e.clientX - s.x; s.sy = e.clientY - s.y; view.style.cursor = 'grabbing'; } 
        };

        view.ontouchstart = (e) => {
            if(e.target.closest('.floating-controls') || e.target.closest('.fullscreen-btn')) return;
            view.classList.remove('resetting');
            if(e.touches.length === 1) {
                const t = e.touches[0];
                if(e.target.closest('#handle')) { s.slide = true; e.preventDefault(); } 
                else { s.drag = true; s.sx = t.clientX - s.x; s.sy = t.clientY - s.y; }
            } else if (e.touches.length === 2) {
                s.drag = s.slide = false;
                s.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        };

        window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
        window.ontouchmove = (e) => {
            if(e.touches.length === 1) {
                const t = e.touches[0];
                if (s.slide || s.drag) { e.preventDefault(); handleMove(t.clientX, t.clientY); }
            } else if(e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const delta = (dist - s.lastDist) * (s.z * 0.01);
                const oldZ = s.z; s.z = Math.min(Math.max(1, s.z + delta), 20);
                const r = view.getBoundingClientRect();
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left, midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
                s.x = midX - ((midX - s.x) / oldZ) * s.z; s.y = midY - ((midY - s.y) / oldZ) * s.z;
                s.lastDist = dist; render();
            }
        };

        function handleMove(clientX, clientY) {
            if(s.slide) { 
                const r = view.getBoundingClientRect(); 
                s.pos = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100)); 
                render(); 
            } else if(s.drag) { 
                s.x = clientX - s.sx; s.y = clientY - s.sy; render(); 
            }
        }

        window.onmouseup = window.ontouchend = () => { 
            if (s.slide || s.drag) {
                s.drag = s.slide = false; view.style.cursor = 'grab';
                view.classList.add('resetting');
                s.pos = 50; render();
                setTimeout(() => view.classList.remove('resetting'), 500);
            }
        };

				bBtn.style.display = 'none';
				aBtn.style.display = 'none';
			}
		}

		// La fonction d'upload reste la même, mais on met à jour le texte du bouton spécifique
		async function triggerUpload(inputId) {
			const fileInput = document.createElement('input');
			fileInput.type = 'file';
			fileInput.accept = 'image/*';

			fileInput.onchange = async (e) => {
				const file = e.target.files[0];
				if (!file) return;

				// Récupération de la langue et du bouton correspondant
				const l = document.getElementById('lang-selector').value;
				const t = translations[l];
				const btnId = inputId === 'b-in' ? 'up-btn-b' : 'up-btn-a';
				const btn = document.getElementById(btnId);
				const originalText = btn.innerText;

				// État de chargement visuel
				btn.innerText = t.upLoading;
				btn.disabled = true;

				try {
					// CORRECTION : L'API Chevereto/Freeimage.host attend du base64, pas un fichier brut
					const base64 = await new Promise((resolve, reject) => {
						const reader = new FileReader();
						reader.onload = () => resolve(reader.result.split(',')[1]); // On retire le préfixe "data:image/...;base64,"
						reader.onerror = reject;
						reader.readAsDataURL(file);
					});

					const formData = new FormData();
					formData.append('key', '6d207e02198a847aa98d0a2a901485a5');
					formData.append('action', 'upload');
					formData.append('source', base64); // ✅ On envoie le base64, pas le fichier brut
					formData.append('format', 'json');

					const response = await fetch('https://freeimage.host/api/1/upload', {
						method: 'POST',
						body: formData
					});

					const data = await response.json();

					// Si l'upload réussit et qu'on obtient l'URL
					if (data && data.image && data.image.url) {
						// On injecte le lien direct dans l'input
						document.getElementById(inputId).value = data.image.url;

						// Feedback de succès
						btn.innerText = t.upDone;
						btn.style.background = "#27ae60"; // Vert succès temporaire

						setTimeout(() => {
							btn.innerText = inputId === 'b-in' ? t.btnBrowseBefore : t.btnBrowseAfter;
							btn.style.background = "";
						}, 2000);
					} else {
						// Si l'API renvoie une erreur interne
						console.error("Erreur API:", data);
						throw new Error("L'API n'a pas renvoyé le lien");
					}
				} catch (err) {
					console.error("Erreur de connexion:", err);
					alert(t.error);
					btn.innerText = originalText;
				} finally {
					btn.disabled = false;
				}
			};
			fileInput.click();
		}

		async function copyURL() {
			try { // <-- Le filet de sécurité principal
				// 1. GOOGLE ANALYTICS
				if (typeof gtag === 'function') {
					gtag('event', 'share_link_generated', {
						'method': 'clipboard',
						'content_type': 'image_comparison'
					});
				}

				// Sécurisation de la lecture des champs (évite les crashs si un champ est vide)
				const beforeVal = document.getElementById('b-in')?.value.trim() || "";
				const afterVal = document.getElementById('a-in')?.value.trim() || "";
				const btn = document.getElementById('share-btn');
				const l = document.getElementById('lang-selector')?.value || 'en';
				const t = translations[l];

				// 2. VÉRIFICATION DES ERREURS
				if (!beforeVal || !afterVal) {
					// On affiche le message d'erreur en rouge					
					btn.innerText = t.errorEmpty;
					btn.style.backgroundColor = "#e74c3c"; // Rouge
					btn.style.borderColor = "#c0392b";
					
					// On remet le bouton à la normale après 2 secondes					
					setTimeout(() => {
						btn.innerText = t.btnShare;
						btn.style.backgroundColor = ""; 
						btn.style.borderColor = "";
					}, 2000);
					
					return; // On arrête la fonction ici, le lien n'est PAS copié
				}

				// --- SI TOUT EST OK, ON COPIE LE LIEN ---
				if (typeof applyFlash === 'function') applyFlash('share-btn');

				// --- 3. PRÉPARATION DU LIEN LONG OPTIMISÉ ---
				let baseURL = window.location.href.split('?')[0];
				if (window.location.protocol === 'file:') baseURL = "https://hdl34.github.io/Image-comparator/";
				const u = new URL(baseURL);

				['fr', 'en', 'de', 'it', 'es'].forEach(lang => {
					const el = document.getElementById('t-' + lang);
					if (el && el.value.trim() !== "") {
						u.searchParams.set('t-' + lang, el.value.trim());
					}
				});
				u.searchParams.set('before', beforeVal);
				u.searchParams.set('after', afterVal);

				let finalLink = u.href;

				// 4. RÉDUCTION VIA TINYURL
				try {
					const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(finalLink)}`);
					if (response.ok) {
						const shortUrl = await response.text();
						if (shortUrl.startsWith("http")) finalLink = shortUrl;
					}
				} catch (apiError) {
					console.warn("API de réduction bloquée, utilisation du lien long.");
				}

				// 5. COPIE SÉCURISÉE (Double méthode anti-bug)
				try {
					await navigator.clipboard.writeText(finalLink);
				} catch (clipboardError) {
					// Plan B si le navigateur bloque le presse-papier après le délai de l'API
					const textArea = document.createElement("textarea");
					textArea.value = finalLink;
					document.body.appendChild(textArea);
					textArea.select();
					document.execCommand("copy");
					document.body.removeChild(textArea);
				}

				// 6. MESSAGE DE SUCCÈS 
				btn.innerText = t.alertCopy;
				setTimeout(() => {
					btn.innerText = translations[document.getElementById('lang-selector').value].btnShare;
				}, 1500);

			} catch (globalError) {
				// En cas de gros problème, on affiche quand même quelque chose dans la console
				console.error("Erreur critique empêchant la copie :", globalError);
			}
		}

		window.onload = () => {
			const p = new URLSearchParams(window.location.search);
			document.getElementById('home-btn').href = window.location.pathname;
			
			// TRÈS IMPORTANT : On traduit tout de suite, avant même de savoir si c'est un lien partagé
			changeLang(); 

			if(window.location.protocol === 'file:' || !p.has('before')) admin.style.display = 'flex';
			
			if(p.has('before')) {
				gtag('event', 'view_shared_comparison');
				['fr', 'en', 'de', 'it', 'es'].forEach(l => {
					const val = p.get('t-'+l);
					if(val) document.getElementById('t-'+l).value = val;
				});
				document.getElementById('b-in').value = p.get('before');
				document.getElementById('a-in').value = p.get('after');
				document.getElementById('home-btn').style.display = 'flex';
				
				// On re-traduit au cas où le titre aurait été modifié par le lien
				changeLang(); 
				
				// On lance enfin le chargement (le spinner apparaîtra correctement)
				init();
			}
		};
        window.addEventListener('resize', updateViewportSize);
    </script>
