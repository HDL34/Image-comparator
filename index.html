<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simple comparateur d'image</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1.1">
    <style>
        :root { 
            --bg: #121212; --panel-bg: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --input-bg: #252525;
        }
        .light-theme { 
            --bg: #f4f7f6; --panel-bg: #ffffff; --text: #2c3e50; --accent: #3498db; --input-bg: #ffffff;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; transition: background 0.3s, color 0.3s; position: relative; }
        .main-title { margin-bottom: 20px; font-size: 28px; font-weight: bold; }
        
        #theme-toggle { position: absolute; top: 20px; right: 20px; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--text); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; }

        #admin-panel { background: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 100%; max-width: 800px; display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.2); }
        input { padding: 12px; border: 1px solid rgba(128,128,128,0.3); border-radius: 4px; background: var(--input-bg); color: var(--text); }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        #gen-btn { background: var(--accent); }
        #share-btn { background: #27ae60; }

        #viewport { 
            position: relative; width: 100%; max-width: 1200px; 
            background: var(--bg); overflow: hidden; border-radius: 4px; 
            display: none; cursor: grab; user-select: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        #zoom-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        .img-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        #before-mask { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; z-index: 2; border-right: 2px solid white; }
        #handle { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; z-index: 10; cursor: ew-resize; transform: translateX(-50%); }
        #handle-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #121212; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0,0,0,0.5); font-weight: bold; font-size: 10px; }

        .label { position: absolute; bottom: 15px; padding: 5px 10px; background: rgba(0,0,0,0.8); color: white; font-size: 11px; border-radius: 3px; z-index: 5; text-transform: uppercase; }
        .l-before { left: 15px; } .l-after { right: 15px; }
        #comp-title-display { margin: 15px 0; font-size: 22px; }

        footer { position: fixed; bottom: 10px; width: 100%; display: flex; justify-content: center; align-items: center; padding: 0 20px; box-sizing: border-box; font-size: 13px; opacity: 0.7; }
        #lang-selector { position: absolute; left: 20px; padding: 5px; border-radius: 4px; background: var(--panel-bg); color: var(--text); border: 1px solid rgba(128,128,128,0.3); }
        .credits { font-style: italic; }
    </style>
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">Mode Clair</button>
    <div class="main-title" id="main-title-text">Simple comparateur d'image</div>

    <div id="admin-panel">
        <input type="text" id="t-in" placeholder="Titre">
        <input type="text" id="b-in" placeholder="Lien Google Drive - AVANT">
        <input type="text" id="a-in" placeholder="Lien Google Drive - APRÈS">
        <div class="btn-group">
            <button id="gen-btn" onclick="init()">Générer la vue</button>
            <button id="share-btn" onclick="copyURL()">Copier le lien GitHub</button>
        </div>
    </div>

    <h2 id="comp-title-display"></h2>

    <div id="viewport">
        <div id="zoom-container">
            <img id="img-after" class="img-layer">
            <div id="before-mask">
                <img id="img-before" class="img-layer">
            </div>
        </div>
        <div id="handle"><div id="handle-circle">◀▶</div></div>
        <div class="label l-before" id="label-before">Avant</div>
        <div class="label l-after" id="label-after">Après</div>
    </div>

    <footer>
        <select id="lang-selector" onchange="changeLang()">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
        </select>
        <div class="credits"><span id="credit-text">Créé par</span> Harald de Luca</div>
    </footer>

    <script>
        const translations = {
            fr: { title: "Simple comparateur d'image", before: "Avant", after: "Après", btnTheme: "Mode Clair", btnGen: "Générer la vue", btnShare: "Copier le lien GitHub", placeholderT: "Titre", createdBy: "Créé par" },
            en: { title: "Simple Image Comparator", before: "Before", after: "After", btnTheme: "Light Mode", btnGen: "Generate View", btnShare: "Copy GitHub Link", placeholderT: "Title", createdBy: "Created by" },
            de: { title: "Einfacher Bildvergleich", before: "Vorher", after: "Nachher", btnTheme: "Heller Modus", btnGen: "Ansicht generieren", btnShare: "GitHub-Link kopieren", placeholderT: "Titel", createdBy: "Erstellt von" },
            it: { title: "Semplice Comparatore di Immagini", before: "Prima", after: "Dopo", btnTheme: "Modalità Chiara", btnGen: "Genera Vista", btnShare: "Copia Link GitHub", placeholderT: "Titolo", createdBy: "Creato da" },
            es: { title: "Comparador de Imágenes Simple", before: "Antes", after: "Después", btnTheme: "Modo Claro", btnGen: "Generar Vista", btnShare: "Copiar Enlace GitHub", placeholderT: "Título", createdBy: "Creado por" }
        };

        function changeLang() {
            const l = document.getElementById('lang-selector').value;
            const t = translations[l];
            document.getElementById('main-title-text').innerText = t.title;
            document.title = t.title;
            document.getElementById('label-before').innerText = t.before;
            document.getElementById('label-after').innerText = t.after;
            document.getElementById('theme-toggle').innerText = document.body.classList.contains('light-theme') ? (l === 'fr' ? "Mode Sombre" : "Dark Mode") : t.btnTheme;
            document.getElementById('gen-btn').innerText = t.btnGen;
            document.getElementById('share-btn').innerText = t.btnShare;
            document.getElementById('t-in').placeholder = t.placeholderT;
            document.getElementById('credit-text').innerText = t.createdBy;
        }

        let s = { z: 1, x: 0, y: 0, pos: 50, drag: false, slide: false };
        const view = document.getElementById('viewport');
        const zoomer = document.getElementById('zoom-container');
        const mask = document.getElementById('before-mask');
        const imgB = document.getElementById('img-before');
        const imgA = document.getElementById('img-after');
        const handle = document.getElementById('handle');

        if (window.location.protocol === 'file:') {
            document.getElementById('admin-panel').style.display = 'flex';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const l = document.getElementById('lang-selector').value;
            const btn = document.getElementById('theme-toggle');
            const isLight = document.body.classList.contains('light-theme');
            btn.innerText = isLight ? (l === 'fr' ? "Mode Sombre" : "Dark Mode") : translations[l].btnTheme;
        }

        function init() {
            const clean = (u) => {
                const m = u.match(/\/d\/(.+?)(?:\/|$)/);
                return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w16000&nocache=${Date.now()}` : u;
            };
            imgB.src = clean(document.getElementById('b-in').value);
            imgA.src = clean(document.getElementById('a-in').value);
            document.getElementById('comp-title-display').innerText = document.getElementById('t-in').value;
            
            imgA.onload = () => { 
                view.style.display = 'block'; 
                const ratio = imgA.naturalHeight / imgA.naturalWidth;
                view.style.height = (view.offsetWidth * ratio) + "px";
                setTimeout(render, 100); 
            };
        }

        function render() {
            zoomer.style.transform = `translate(${s.x}px, ${s.y}px) scale(${s.z})`;
            mask.style.width = `${s.pos}%`;
            imgB.style.width = zoomer.clientWidth + "px";
            imgB.style.height = zoomer.clientHeight + "px";
            handle.style.left = `${s.pos}%`;
        }

        view.onwheel = (e) => {
            e.preventDefault();
            const r = view.getBoundingClientRect();
            const mX = (e.clientX - r.left - s.x) / s.z;
            const mY = (e.clientY - r.top - s.y) / s.z;
            s.z = Math.min(Math.max(1, s.z - e.deltaY * 0.0015), 20);
            s.x = e.clientX - r.left - mX * s.z;
            s.y = e.clientY - r.top - mY * s.z;
            render();
        };

        view.onmousedown = (e) => { if(e.target.closest('#handle')) s.slide = true; else { s.drag = true; s.sx = e.clientX - s.x; s.sy = e.clientY - s.y; } };
        window.onmousemove = (e) => {
            if(s.slide) { 
                const r = view.getBoundingClientRect(); 
                s.pos = Math.max(0, Math.min(100, ((e.clientX - r.left) / r.width) * 100)); 
            } else if(s.drag) { s.x = e.clientX - s.sx; s.y = e.clientY - s.sy; }
            render();
        };
        window.onmouseup = () => { s.drag = s.slide = false; };

        function copyURL() {
            const u = new URL(window.location.href.split('?')[0]);
            u.searchParams.set('title', document.getElementById('t-in').value);
            u.searchParams.set('before', document.getElementById('b-in').value);
            u.searchParams.set('after', document.getElementById('a-in').value);
            navigator.clipboard.writeText(u.href);
            alert("Lien copié !");
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('before')) {
                document.getElementById('t-in').value = p.get('title');
                document.getElementById('b-in').value = p.get('before');
                document.getElementById('a-in').value = p.get('after');
                init();
            }
        };
    </script>
</body>
</html>
