<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple comparateur d'image</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1.1">
    <style>
        :root { 
			--bg: #121212; 
			--panel-bg: #1e1e1e; 
			--text: #e0e0e0; 
			--accent: #3498db; 
			--input-bg: #252525; 
		}
        .light-theme { 
			--bg: #f4f7f6; 
			--panel-bg: #ffffff; 
			--text: #2c3e50; 
			--accent: #3498db; 
			--input-bg: #ffffff; 
		}
        
        body { 
			font-family: 'Segoe UI', sans-serif; 
			background: var(--bg); 
			color: var(--text); 
			display: flex; 
			flex-direction: column; 
			align-items: center; 
			padding: 10px; margin: 0; 
			min-height: 100vh; 
			transition: background 0.3s, color 0.3s; 
			position: relative; 
			overflow-x: hidden; 
		}
        .main-title { 
			margin-top: 10px; 
			margin-bottom: 15px; 
			font-size: 24px; 
			font-weight: bold; 
			text-align: center; 
			width: 80%; 
		}
        
        #home-btn { 
			position: absolute; 
			top: 15px; 
			left: 15px; 
			width: 40px; 
			height: 40px; 
			border-radius: 10%; 
			border: 1px solid rgba(128,128,128,0.3); 
			background: var(--panel-bg); 
			color: var(--text); 
			cursor: pointer; 
			z-index: 100; 
			display: none; 
			align-items: center; 
			justify-content: center; 
			transition: 0.2s; 
			text-decoration: none; 
		}
        #home-btn:hover { background: rgba(128,128,128,0.2); 
		}

        #theme-toggle { 
			position: absolute; 
			top: 15px; right: 15px; 
			padding: 8px 12px; 
			border-radius: 4px; 
			border: 1px solid rgba(128,128,128,0.3); 
			background: var(--panel-bg); 
			color: var(--text); 
			cursor: pointer; 
			font-size: 11px; 
			z-index: 100; 
		}
        @media (max-width: 600px) { 
			#theme-toggle { top: 15px; 
				right: 15px; 
			} 
			#home-btn { top: 15px; 
				left: 15px; 
			} 
			.main-title { margin-top: 50px; 
				margin-bottom: 20px; 
			} 
		}

        #admin-panel { 
			background: var(--panel-bg); 
			padding: 15px; 
			border-radius: 8px; 
			box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
			width: 100%; max-width: 1100px; 
			display: none; 
			flex-direction: column; 
			gap: 10px; margin-bottom: 20px; 
			border: 1px solid rgba(128,128,128,0.2); 
			box-sizing: border-box; 
		}
        .title-grid { 
			display: grid; 
			grid-template-columns: 1fr; 
			gap: 8px; 
		}
        @media (min-width: 600px) { 
			.title-grid { grid-template-columns: repeat(5, 1fr); 
			} 
		}
        .link-grid { 
			display: grid; 
			grid-template-columns: 1fr; 
			gap: 10px; 
		}
        @media (min-width: 600px) { 
			.link-grid { 
				grid-template-columns: 1fr 1fr; 
			} 
		}
        
        input { 
			padding: 10px; 
			border: 1px solid rgba(128,128,128,0.3); 
			border-radius: 4px; 
			background: var(--input-bg); 
			color: var(--text); 
			font-size: 14px; 
			width: 100%; 
			box-sizing: border-box; 
		}
		.btn-group { 
            display: flex; 
            gap: 10px; 
            width: 100%; 
        }
        
        .btn-group button { 
            flex: 1; /* Force les boutons à prendre 50% de la largeur chacun */
            padding: 12px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            transition: 0.2s; 
        }
        
        .btn-group { 
			display: flex; 
			gap: 10px; 
			flex-wrap: wrap; 
		}
        #gen-btn { background: var(--accent); }
        #share-btn { background: #27ae60; }
		
		/* Animation d'éclaircissement */
		@keyframes flash-white {
			0% { filter: brightness(1); }
			50% { filter: brightness(1.8); }
			100% { filter: brightness(1); }
		}

		.flash-effect {
			animation: flash-white 0.3s ease-out;
		}		
		
        .host-btn-group { 
			display: flex; 
			gap: 10px; 
			flex-wrap: wrap; 
			justify-content: center; 
			margin: 10px 0 15px 0; 
		}
        .host-img-btn { 
			display: inline-block; 
			transition: transform 0.2s, opacity 0.2s; 
			text-decoration: none; 
		}
        .host-img-btn:hover { 
			transform: scale(1.05); 
		}
			.host-img-btn img { 
			height: 40px; width: auto; 
			border: none; 
			display: block; 
		}

        #viewport { 
			position: relative; 
			background: var(--bg); 
			overflow: hidden; 
			border-radius: 4px; 
			display: none; 
			cursor: grab; 
			user-select: none; 
			box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
			touch-action: none; 
			width: 95vw; 
		}
		
		/* --- SPINNER DE CHARGEMENT --- */
		#loading-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: var(--bg); /* S'adapte au mode clair/sombre */
			z-index: 50;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}

		.spinner {
			width: 50px;
			height: 50px;
			border: 5px solid rgba(128, 128, 128, 0.2);
			border-top-color: var(--accent); /* La bordure qui tourne est bleue */
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		#loading-text {
			margin-top: 15px;
			font-weight: bold;
			color: var(--text); /* S'adapte au mode clair/sombre */
		}
		
        #viewport:fullscreen { 
			width: 100vw !important; 
			height: 100vh !important; 
			border-radius: 0; 
		}

        .zoom-container { 
			position: absolute; 
			top: 0; left: 0; 
			width: 100%; 
			height: 100%; 
			transform-origin: 0 0; 
			will-change: transform; 
			backface-visibility: hidden; 
		}
        .img-layer { 
			position: absolute; 
			top: 0; 
			left: 0; 
			width: 100%; 
			height: 100%; 
			object-fit: contain; 
			pointer-events: none; 
			image-rendering: pixelated; 
			image-rendering: crisp-edges; 
		}
        
        #before-mask { 
			position: absolute; 
			top: 0; left: 0; 
			width: 50%; 
			height: 100%; 
			overflow: hidden; 
			z-index: 2; 
			border-right: 2px solid white; 
			box-sizing: border-box; 
			will-change: width; 
		}
        #handle { 
			position: absolute; 
			top: 0; left: 50%; 
			width: 60px; 
			height: 100%; 
			z-index: 10; 
			cursor: ew-resize; 
			transform: translateX(-50%); 
			background-color: transparent; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			will-change: left; 
		}
        #handle-circle { 
			background: white; 
			color: #121212; 
			width: 40px; 
			height: 40px; 
			border-radius: 50%; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			box-shadow: 0 0 15px rgba(0,0,0,0.5); 
			font-weight: bold; 
			font-size: 14px; 
			pointer-events: none; 
		}

        /* Transition fluide de retour au centre uniquement */
        .resetting #before-mask, .resetting #handle { transition: width 0.5s ease-out, left 0.5s ease-out; }

        .floating-controls { 
			position: absolute; 
			top: 1px; left: 50%; 
			transform: translateX(-50%); 
			display: none; 
			gap: 10px; 
			z-index: 20; 
		}
        .float-btn { 
			background: rgba(0, 0, 0, 0.7); 
			color: #fff; 
			border: 1px solid rgba(255, 255, 255, 0.4); 
			border-radius: 4px; 
			padding: 8px 12px; 
			font-size: 12px; 
			font-weight: bold; 
			cursor: pointer; 
			backdrop-filter: blur(4px); 
			transition: 0.2s; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			white-space: nowrap; 
		}

        .fullscreen-btn { 
			position: absolute; 
			bottom: 40px; 
			right: 12px; z-index: 20; 
			width: 44px; 
			height: 44px; 
			min-width: 44px; 
			padding: 0; 
			border-radius: 10%; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
		}

        #zoom-controls { 
			display: flex; 
			border-radius: 4px; 
			overflow: hidden; 
			border: 1px solid rgba(255, 255, 255, 0.4); 
			background: rgba(0, 0, 0, 0.7); 
			backdrop-filter: blur(4px); 
		}
        .zoom-btn { 
			background: transparent; 
			border: none; 
			color: white; 
			padding: 8px 15px; 
			cursor: pointer; 
			font-size: 18px; 
			min-width: 44px; 
		}
        .zoom-btn:first-child { 
			border-right: 1px solid rgba(255, 255, 255, 0.2); 
		}

        .label { 
			position: absolute; 
			bottom: 10px; 
			padding: 4px 8px; 
			background: rgba(0,0,0,0.8); 
			color: white; 
			font-size: 10px; 
			border-radius: 3px; 
			z-index: 5; 
			text-transform: uppercase; 
			pointer-events: none; 
		}
        .l-before { left: 10px; } .l-after { right: 10px; }
        #comp-title-display { 
			margin: 10px 0; 
			font-size: 18px; 
			min-height: 25px; 
			text-align: center; 
			padding: 0 10px; 
			display: none; 
		}

		footer { 
			position: relative; 
			width: 100%; 
			display: flex; 
			justify-content: center; 
			align-items: center; 
			padding: 20px 0; 
			margin-top: auto; /* Pousse vers le bas si le contenu est court */
			font-size: 12px; 
			opacity: 0.7; 
			min-height: 50px;
		}

		@media (min-width: 600px) {
			#lang-selector { 
				position: absolute; 
				left: 10px; 
			}
		}

		/* En mode portrait ou petit écran, on empile proprement */
		@media (max-width: 599px) {
			footer {
				flex-direction: column;
				gap: 15px;
			}
		}
			
		#lang-selector { 
			padding: 5px; 
			border-radius: 4px; 
			background: var(--panel-bg); 
			color: var(--text); 
			border: 1px solid rgba(128,128,128,0.3); 
		}
		}
    </style>
</head>
<body>

    <a id="home-btn" href="" title="Retour à l'accueil">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">

    </a>

    <button id="theme-toggle" onclick="toggleTheme()"></button>
    <div class="main-title" id="main-title-text"></div>

    <div id="admin-panel">
        <div class="title-grid">
            <input type="text" id="t-fr" placeholder="Titre (Français)">
            <input type="text" id="t-en" placeholder="Title (English)">
            <input type="text" id="t-de" placeholder="Titel (Deutsch)">
            <input type="text" id="t-it" placeholder="Titolo (Italiano)">
            <input type="text" id="t-es" placeholder="Título (Español)">
        </div>
		
        <p id="host-help-text" style="font-size: 14px; margin: 5px 0; text-align: center;"></p>
        
        <div class="host-btn-group">
            <a href="https://zupimages.net/" target="_blank" class="host-img-btn"><img src="zupimages.net.png" alt="Zupimages"></a>
            <a href="https://freeimage.host/" target="_blank" class="host-img-btn"><img src="freeimage.host.png" alt="Freeimage"></a>
            <a href="https://goopics.net/" target="_blank" class="host-img-btn"><img src="goopics.net.png" alt="Goopics"></a>
            <a href="https://imgur.com/upload" target="_blank" class="host-img-btn"><img src="Imgur_Logo.png" alt="Imgur"></a>
            <a href="https://postimages.org/" target="_blank" class="host-img-btn"><img src="postimages.org.png" alt="PostImage"></a>

        <div class="btn-group">
            <button id="gen-btn" onclick="init()"></button>
            <button id="share-btn" onclick="copyURL()"></button>

    </div>

    <h2 id="comp-title-display"></h2>

    <div id="viewport">
		<div id="loading-overlay" style="display: none;">
			<div class="spinner"></div>
			<div id="loading-text"></div>
		</div>
	    <div class="floating-controls">
			<div id="zoom-controls">
				<button id="zoom-out-btn" class="zoom-btn" onclick="manualZoom(-0.5)" title=""></button>
				<button id="zoom-in-btn" class="zoom-btn" onclick="manualZoom(0.5)" title=""></button>
			</div>
			<button id="reset-btn" class="float-btn" style="display:none;" onclick="resetView()" title=""></button>
        </div>
        
        <button class="float-btn fullscreen-btn" onclick="toggleFullscreen()" id="fs-btn">
            <svg id="fs-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>

        <div id="zoom-container-after" class="zoom-container"><img id="img-after" class="img-layer"></div>
        <div id="before-mask"><div id="zoom-container-before" class="zoom-container"><img id="img-before" class="img-layer"></div></div>
        <div id="handle"><div id="handle-circle">◀▶</div></div>
        <div class="label l-before" id="label-before">Avant</div>
        <div class="label l-after" id="label-after">Après</div>
    </div>

    <footer>
        <select id="lang-selector" onchange="changeLang()">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
        </select>
        <div class="credits"><span id="credit-text"></span> Harald de Luca</div>
    </footer>

    <script>
        const translations = {

				createdBy: "Created by",

        let s = { z: 1, x: 0, y: 0, pos: 50, drag: false, slide: false, lastDist: 0 };
        const view = document.getElementById('viewport');
        const zoomerA = document.getElementById('zoom-container-after');
        const zoomerB = document.getElementById('zoom-container-before');
        const mask = document.getElementById('before-mask');
        const imgB = document.getElementById('img-before');
        const imgA = document.getElementById('img-after');
        const handle = document.getElementById('handle');
        const admin = document.getElementById('admin-panel');

        function changeLang() {
            const l = document.getElementById('lang-selector').value;
            const t = translations[l];
            document.getElementById('main-title-text').innerText = t.title;
            document.getElementById('label-before').innerText = t.before;
            document.getElementById('label-after').innerText = t.after;
			document.getElementById('zoom-out-btn').innerText = "−"; 
			document.getElementById('zoom-in-btn').innerText = "+";
            document.getElementById('reset-btn').innerText = t.btnReset;
			document.getElementById('reset-btn').title = t.btnReset; // Traduit l'infobulle du bouton Reset
			document.getElementById('zoom-in-btn').title = t.zoomIn; // Traduit le bouton +
			document.getElementById('zoom-out-btn').title = t.zoomOut; // Traduit le bouton -
            document.getElementById('home-btn').title = t.home; // Bouton du retour à la page d'accueil
            document.getElementById('fs-btn').title = document.fullscreenElement ? t.exitFullscreen : t.fullscreen;
			document.getElementById('loading-text').innerText = t.loading;
            document.getElementById('gen-btn').innerText = t.btnGen;
            document.getElementById('share-btn').innerText = t.btnShare;
            document.getElementById('host-help-text').innerText = t.hostHelp;
            document.getElementById('b-in').placeholder = t.placeholderBefore;
            document.getElementById('a-in').placeholder = t.placeholderAfter;
            document.getElementById('direct-link-note').innerText = t.directLinkNote;
			document.getElementById('credit-text').innerText = t.createdBy + " ";
			
			// CORRECTION DU BUG DE LANGUE DU BOUTON THÈME
            const themeBtn = document.getElementById('theme-toggle');
            if (document.body.classList.contains('light-theme')) {
                themeBtn.innerText = t.btnThemeDark;
            } else {
                themeBtn.innerText = t.btnThemeLight;
            }
			
            const customTitle = document.getElementById('t-' + l).value;
            document.getElementById('comp-title-display').innerText = customTitle || t.defaultComp;
        }

        function toggleTheme() { 
			document.body.classList.toggle('light-theme'); 
			changeLang(); 
		}

        function toggleFullscreen() {
            if (!document.fullscreenElement) { view.requestFullscreen().catch(err => console.log(err)); } 
            else { document.exitFullscreen(); }
        }

        document.addEventListener('fullscreenchange', () => {
            updateViewportSize();
            changeLang();
            const fsIcon = document.getElementById('fs-icon');
            if (document.fullscreenElement) {
                fsIcon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>';
            } else {
                fsIcon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>';
            }
        });

        const clean = (u) => {
            if (!u) return "";
            u = u.trim();
            const driveMatch = u.match(/\/d\/(.+?)(?:\/|$)/);
            if (driveMatch) return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w16000&nocache=${Date.now()}`;
            if (u.includes("imgur.com") && !u.match(/\.(jpg|png|gif|webp)$/)) {
                const imgurId = u.split('/').pop();
                return `https://i.imgur.com/${imgurId}.png`;
            }
            return u;
        };

		function applyFlash(elementId) {
			const el = document.getElementById(elementId);
			el.classList.remove('flash-effect'); // On retire si déjà présent
			void el.offsetWidth; // "Magic" pour forcer le redémarrage de l'animation
			el.classList.add('flash-effect');
			
			// On retire la classe après l'animation (0.3s) pour pouvoir recommencer
			setTimeout(() => el.classList.remove('flash-effect'), 300);
		}
		
		function init() {
			applyFlash('gen-btn'); // Ajoute l'éclaircie
			
			// 1. On affiche la zone de travail et le spinner immédiatement
			// On affiche le comparateur tout de suite pour donner un retour visuel
			view.style.display = 'block'; 
			document.getElementById('comp-title-display').style.display = 'block';
			document.querySelector('.floating-controls').style.display = 'none'; // On cache les boutons pour l'instant
			document.getElementById('loading-overlay').style.display = 'flex'; // On affiche le spinner
			
			// 2. On lance le téléchargement des images
			// On lance le chargement des images
			imgB.src = clean(document.getElementById('b-in').value);
			imgA.src = clean(document.getElementById('a-in').value);

			// 3. Quand l'image principale est chargée...
			imgA.onload = () => { 
				document.getElementById('loading-overlay').style.display = 'none'; // On cache le spinner
				document.querySelector('.floating-controls').style.display = 'flex'; // On révèle les boutons
				updateViewportSize(); 
				changeLang(); 
			};
		}

        function updateViewportSize() {
            if (!imgA.naturalWidth) return;
            const ratio = imgA.naturalWidth / imgA.naturalHeight;
            if (document.fullscreenElement) {
                view.style.width = "100vw"; view.style.height = "100vh";
            } else {
                const maxWidth = Math.min(window.innerWidth - 20, 1200); 
                const maxHeight = window.innerHeight - (window.innerHeight < 500 ? 120 : 250);
                let finalWidth = maxWidth, finalHeight = finalWidth / ratio;
                if (finalHeight > maxHeight) { finalHeight = maxHeight; finalWidth = finalHeight * ratio; }
                view.style.width = finalWidth + "px"; view.style.height = finalHeight + "px";
            }
            render();
        }

        function render() {
            const transformStr = `translate(${s.x}px, ${s.y}px) scale(${s.z})`;
            zoomerA.style.transform = transformStr; zoomerB.style.transform = transformStr;
            zoomerB.style.width = view.offsetWidth + "px"; zoomerB.style.height = view.offsetHeight + "px";
            mask.style.width = `${s.pos}%`; handle.style.left = `${s.pos}%`;
            document.getElementById('reset-btn').style.display = (s.z !== 1 || s.x !== 0 || s.y !== 0) ? 'block' : 'none';
        }

        function resetView() { s.z = 1; s.x = 0; s.y = 0; render(); }

        function manualZoom(delta) {
            const oldZ = s.z; s.z = Math.min(Math.max(1, s.z + delta), 20);
            const r = view.getBoundingClientRect();
            const cX = r.width / 2, cY = r.height / 2;
            s.x = cX - ((cX - s.x) / oldZ) * s.z; s.y = cY - ((cY - s.y) / oldZ) * s.z;
            render();
        }

        view.onwheel = (e) => {
            e.preventDefault(); 
            const r = view.getBoundingClientRect();
            const mX = (e.clientX - r.left - s.x) / s.z, mY = (e.clientY - r.top - s.y) / s.z;
            s.z = Math.min(Math.max(1, s.z - e.deltaY * 0.0015), 20);
            s.x = e.clientX - r.left - mX * s.z; s.y = e.clientY - r.top - mY * s.z;
            render();
        };

        view.onmousedown = (e) => { 
            if(e.target.closest('.floating-controls') || e.target.closest('.fullscreen-btn')) return;
            view.classList.remove('resetting');
            if(e.target.closest('#handle')) s.slide = true; 
            else { s.drag = true; s.sx = e.clientX - s.x; s.sy = e.clientY - s.y; view.style.cursor = 'grabbing'; } 
        };

        view.ontouchstart = (e) => {
            if(e.target.closest('.floating-controls') || e.target.closest('.fullscreen-btn')) return;
            view.classList.remove('resetting');
            if(e.touches.length === 1) {
                const t = e.touches[0];
                if(e.target.closest('#handle')) { s.slide = true; e.preventDefault(); } 
                else { s.drag = true; s.sx = t.clientX - s.x; s.sy = t.clientY - s.y; }
            } else if (e.touches.length === 2) {
                s.drag = s.slide = false;
                s.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        };

        window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
        window.ontouchmove = (e) => {
            if(e.touches.length === 1) {
                const t = e.touches[0];
                if (s.slide || s.drag) { e.preventDefault(); handleMove(t.clientX, t.clientY); }
            } else if(e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const delta = (dist - s.lastDist) * (s.z * 0.01);
                const oldZ = s.z; s.z = Math.min(Math.max(1, s.z + delta), 20);
                const r = view.getBoundingClientRect();
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left, midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
                s.x = midX - ((midX - s.x) / oldZ) * s.z; s.y = midY - ((midY - s.y) / oldZ) * s.z;
                s.lastDist = dist; render();
            }
        };

        function handleMove(clientX, clientY) {
            if(s.slide) { 
                const r = view.getBoundingClientRect(); 
                s.pos = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100)); 
                render(); 
            } else if(s.drag) { 
                s.x = clientX - s.sx; s.y = clientY - s.sy; render(); 
            }
        }

        window.onmouseup = window.ontouchend = () => { 
            if (s.slide || s.drag) {
                s.drag = s.slide = false; view.style.cursor = 'grab';
                view.classList.add('resetting');
                s.pos = 50; render();
                setTimeout(() => view.classList.remove('resetting'), 500);
            }
        };

        function copyURL() {
			applyFlash('share-btn'); // Ajoute l'éclaircie
            let baseURL = window.location.href.split('?')[0];
            if (window.location.protocol === 'file:') baseURL = "https://hdl34.github.io/Image-comparator/";
            const u = new URL(baseURL);
            ['fr', 'en', 'de', 'it', 'es'].forEach(l => {
                const val = document.getElementById('t-'+l).value;
                if(val) u.searchParams.set('t-'+l, val);
            });
            u.searchParams.set('before', document.getElementById('b-in').value);
            u.searchParams.set('after', document.getElementById('a-in').value);
            navigator.clipboard.writeText(u.href);
            alert(translations[document.getElementById('lang-selector').value].alertCopy);
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            document.getElementById('home-btn').href = window.location.pathname;
            if(window.location.protocol === 'file:' || !p.has('before')) admin.style.display = 'flex';
            if(p.has('before')) {
                ['fr', 'en', 'de', 'it', 'es'].forEach(l => {
                    const val = p.get('t-'+l);
                    if(val) document.getElementById('t-'+l).value = val;
                });
                document.getElementById('b-in').value = p.get('before');
                document.getElementById('a-in').value = p.get('after');
                document.getElementById('home-btn').style.display = 'flex';
                init();
            }
			changeLang(); // <--- Cette ligne remplit tous tes titres et boutons d'un coup!
        };
        window.addEventListener('resize', updateViewportSize);
    </script>
</body>
